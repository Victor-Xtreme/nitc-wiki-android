name: NITC Wiki MVP build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: gradle/actions/wrapper-validation@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    - uses: gradle/gradle-build-action@v3
    - name: Build NITC Wiki dev debug
      run: ./gradlew clean assembleNitcwikiDebug --no-daemon
