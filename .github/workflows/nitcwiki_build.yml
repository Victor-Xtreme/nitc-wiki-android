name: NITC Wiki MVP build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: gradle/actions/wrapper-validation@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    - uses: gradle/gradle-build-action@v3
    - name: Build NITC Wiki dev debug
      run: ./gradlew clean assembleNitcwikiDebug --no-daemon
    - name: Upload debug APK
      uses: actions/upload-artifact@v7
      with:
        name: nitcwiki-debug-apk
        path: app/build/outputs/apk/nitcwiki/debug/*.apk
